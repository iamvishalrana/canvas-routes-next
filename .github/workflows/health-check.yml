name: Site Health Check

on:
  schedule:
    - cron: '0 8 * * *'    # 4 AM Montreal (EDT, UTC-4)
    - cron: '0 14 * * *'   # 10 AM Montreal (EDT, UTC-4)
    - cron: '0 20 * * *'   # 4 PM Montreal (EDT, UTC-4)
    - cron: '0 2 * * *'    # 10 PM Montreal (EDT, UTC-4)
  workflow_dispatch:         # triggered from admin panel

jobs:
  health-check:
    name: Check registration pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run health checks
        run: npx playwright test tests/health.spec.js --reporter=list
