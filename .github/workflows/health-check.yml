name: Site Health Check

on:
  schedule:
    - cron: '0 8 * * *'    # 4 AM EDT (8 AM UTC)
    - cron: '0 14 * * *'   # 10 AM EDT (2 PM UTC)
    - cron: '0 20 * * *'   # 4 PM EDT (8 PM UTC)
    - cron: '0 2 * * *'    # 10 PM EDT (2 AM UTC next day)
  workflow_dispatch:         # run manually from GitHub Actions tab anytime

jobs:
  health-check:
    name: Check registration pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run health checks
        run: npx playwright test tests/health.spec.js --reporter=list
